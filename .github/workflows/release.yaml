name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Setup bnd
        uses: carabiner-dev/bnd-actions/setup@HEAD

      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'
          check-latest: true
          cache: false

      - name: Install tejolote
        uses: kubernetes-sigs/release-actions/setup-tejolote@8af7b2a5596dff526de9db59b2c4b8457e9f52a1 # v0.4.0

      - name: Install bom
        uses: kubernetes-sigs/release-actions/setup-bom@8af7b2a5596dff526de9db59b2c4b8457e9f52a1 # v0.4.0

      - name: Set tag output
        id: tag
        run: echo "tag_name=${GITHUB_REF#refs/*/}" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        id: goreleaser
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate SBOM
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bom generate --format=json -o /tmp/drop-${{ steps.tag.outputs.tag_name }}.spdx.json .
          gh release upload ${{ steps.tag.outputs.tag_name }} /tmp/drop-${{ steps.tag.outputs.tag_name }}.spdx.json
      - name: Generate Provenance
        id: tejolote
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            tejolote attest --artifacts github://${{github.repository}}/${{ steps.tag.outputs.tag_name }} github://${{github.repository}}/"${GITHUB_RUN_ID}" --output provenance.json
            bnd statement provenance.json -o ${{ steps.tag.outputs.tag_name }}.provenance.bundle.json
            bnd push ${{github.repository}} drop-${{ steps.tag.outputs.tag_name }}.provenance.json
      - name: Pack and Ship
        id: pack
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run : |
            bnd predicate /tmp/drop-${{ steps.tag.outputs.tag_name }}.spdx.json --type="https://spdx.dev/Document" --subject="sha1:${{ github.sha }}" > sbom.spdx.bundle.json
            bnd pack ${{ steps.tag.outputs.tag_name }}.provenance.bundle.json sbom.spdx.bundle.json > attestations.jsonl
            gh release upload ${{ steps.tag.outputs.tag_name }} attestations.jsonl
